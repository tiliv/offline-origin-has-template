# Registry of the data-piles this node fronts AS A TELL — not a directory of piles
# attached to it as an Atlas. A pile registers with a TELL, never with an Atlas directly:
# it has no address without a Tell to receive for it, so this node lists Tells in
# _data/tells.yml and fronts their piles here. A pile joins by the data-pile `handshake`
# workflow opening a PR that appends its entry below (the consent gesture). The older
# "pile attaches directly to an Atlas and places a coarse map on a pile/<scope>/<id>
# branch it owns" model is retired — discoverability is reached THROUGH a Tell.
#
# Schema mirrors tell/_data/piles.yml (the Tell delivery registry):
#   id            stable slug for the pile (also the served path segment)
#   scope         region/namespace tier; the <scope> segment of the feed ref
#   feed          this node's OWN ref carrying the pile's encrypted chain
#                 (convention feed/<scope>/<id>); the Tell writes it, the pile pulls it
#   age_recipient the pile's age recipient (age1…), supplied by its handshake PR; the
#                 Tell wraps each digest's ratchet seed to it so only the owner reads it
#
# One meaning, two readers, no clobber: the matchmaker (.github/workflows/match.yml)
# reads id + scope from here as candidate piles behind this node's Tell(s); deliver /
# ingress read feed + age_recipient. Seed below is illustrative; replace with real piles.
- id: fc-q1
  scope: "colorado"
  feed: "feed/colorado/fc-q1"
  age_recipient: "age1PLACEHOLDER000000000000000000000000000000000000000000000000"
