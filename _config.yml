title: ANTIBODY

# Published origin of this node. Read by the Atlas matchmaker (atlas/bin/match via
# .github/workflows/match.yml) as the `atlas_url` it signs into /matches.json, so this
# self-hosted Atlas attributes matches to its own URL rather than the upstream default.
url: "https://antibody.fort-collins.colorado.anecdote.channel"

# The workspace root is the publish root. Journal prose lives at journal/ and
# serves at /journal/ (disk path == url path; the engine ships the `journal` mount
# default, so this node need not repeat it). Engine machinery is hidden under the
# dotted .*-engine submodules.

# Site-owned exclude. Declaring it here REPLACES the engine default on merge, so it
# re-lists the engine's entries. The dotted .*-engine mounts are also auto-ignored
# by Jekyll (dotfiles); atlas/ and tell/ are reserved pass-through prefixes, built
# and deployed by their own engines — never by this node's Jekyll build.
exclude:
  - CNAME
  - .bundle
  - Gemfile
  - Gemfile.lock
  - vendor
  - .journal-engine/
  - .atlas-engine/
  - .tell-engine/
  - atlas/
  - tell/
  - node_modules
  - package.json
  - package-lock.json
  - README.md
  - LICENSE.md
  - AGENTS.md
  - .github
  - bin

